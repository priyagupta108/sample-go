name: with_cache_false
on: [push]

jobs:
 # POSITIVE: caching code path (go-custom toolcache)
  with_cache:
    name: with cache enabled
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, windows-11-arm, macos-15-intel, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: gdams/setup-go@msgo
        with:
          go-version: ${{ matrix.os == 'windows-11-arm' && '1.22.12' || '1.25.0' }}
          go-download-base-url: 'https://aka.ms/golang/release/latest'
          cache: false
      - run: go version