name: input_base_url_all_os
on: [push]

jobs:
  # POSITIVE: custom base URL through INPUT, Mode B behavior is fine with exact patch.
  input_base_url_all_os:
    name: input base url (aka.ms)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # default: run 1.25.0 on all these OSes
          - os: ubuntu-latest
            go-version: "1.25.0"
          - os: macos-latest
            go-version: "1.25.0"
          - os: windows-latest
            go-version: "1.25.0"
          - os: macos-15-intel
            go-version: "1.25.0"
          - os: ubuntu-24.04-arm
            go-version: "1.25.0"

          # special case: windows-11-arm uses 1.22.x (NOT 1.25.0)
          - os: windows-11-arm
            go-version: "1.22.12" # change to the exact patch you need (e.g. 1.22.8)

    steps:
      - uses: actions/checkout@v6
      - uses: gdams/setup-go@msgo
        with:
          go-version: ${{ matrix.go-version }}
          go-download-base-url: "https://aka.ms/golang/release/latest"
      - run: go version