name: custom-go-download-positive
on: [push]

jobs:
  # POSITIVE: custom base URL through INPUT, Mode B behavior is fine with exact patch.
  input_base_url_all_os:
    name: input base url (aka.ms) exact patch
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: gdams/setup-go@msgo
        with:
          go-version: '1.25.0'
          go-download-base-url: 'https://aka.ms/golang/release/latest'
      - run: go version

