name: force-version-listing-message
on:
  push: 

jobs:
  force_message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare mirror (tarball exists, listing always 404)
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p mirror
          curl -fsSL -o mirror/go1.23.4.linux-amd64.tar.gz https://go.dev/dl/go1.23.4.linux-amd64.tar.gz

          cat > mirror/server.py <<'PY'
          from http.server import SimpleHTTPRequestHandler, ThreadingHTTPServer
          from urllib.parse import urlparse, parse_qs

          class Handler(SimpleHTTPRequestHandler):
              def do_GET(self):
                  u = urlparse(self.path)
                  qs = parse_qs(u.query)
                  print(f"[mirror] path={self.path}", flush=True)

                  # Force listing to fail
                  if u.path == "/" and qs.get("mode") == ["json"] and qs.get("include") == ["all"]:
                      self.send_response(404)
                      self.end_headers()
                      self.wfile.write(b"not found\n")
                      return

                  return super().do_GET()

          ThreadingHTTPServer(("127.0.0.1", 8001), Handler).serve_forever()
          PY

      - name: Start mirror server
        shell: bash
        run: |
          set -euxo pipefail
          cd mirror
          python3 server.py > /tmp/mirror.log 2>&1 &
          echo $! > /tmp/mirror.pid

      - name: Setup Go (use non-pinned version to force listing)
        uses: gdams/setup-go@msgo
        with:
          go-version: "1.23"             # IMPORTANT: not 1.23.4
          go-download-base-url: "http://127.0.0.1:8001"
          cache: false
          check-latest: false

      - name: Dump mirror log
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          echo "----- /tmp/mirror.log -----"
          tail -n +1 /tmp/mirror.log || true
