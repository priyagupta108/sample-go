# This validates the “happy path” where the custom base URL does support the listing endpoint.

name: custom-go-download-mode-a-json-listing
on: [push]

jobs:
  mode_a_local_mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare mirror content
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p mirror
          curl -L -o mirror/go1.23.4.linux-amd64.tar.gz \
            https://go.dev/dl/go1.23.4.linux-amd64.tar.gz

          cat > mirror/listing.json <<'JSON'
          [
            {
              "version": "go1.23.4",
              "stable": true,
              "files": [
                {
                  "filename": "go1.23.4.linux-amd64.tar.gz",
                  "os": "linux",
                  "arch": "amd64",
                  "kind": "archive"
                }
              ]
            }
          ]
          JSON

          cat > mirror/server.py <<'PY'
          from http.server import SimpleHTTPRequestHandler, ThreadingHTTPServer
          from urllib.parse import urlparse, parse_qs

          class Handler(SimpleHTTPRequestHandler):
              def do_GET(self):
                  u = urlparse(self.path)
                  qs = parse_qs(u.query)
                  if u.path == "/" and qs.get("mode") == ["json"] and qs.get("include") == ["all"]:
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      with open("listing.json", "rb") as f:
                          self.wfile.write(f.read())
                      return
                  return super().do_GET()

          ThreadingHTTPServer(("127.0.0.1", 8000), Handler).serve_forever()
          PY

      - name: Start local mirror server (Mode A)
        shell: bash
        run: |
          set -euxo pipefail
          cd mirror
          python3 server.py >/tmp/mirror.log 2>&1 &
          echo $! > /tmp/mirror.pid

      - name: Setup Go from local mirror (listing endpoint)
        uses: gdams/setup-go@msgo
        with:
          go-version: '1.23.4'
          go-download-base-url: 'http://127.0.0.1:8000'
          cache: false

      - run: go version