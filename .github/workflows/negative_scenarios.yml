name: custom-go-download-negative
on: [push]

jobs:
  # NEGATIVE: stable alias should fail with custom base URL
  stable_alias_should_fail:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Expect failure (stable + custom URL)
        uses: gdams/setup-go@msgo
        with:
          go-version: 'stable'
          go-download-base-url: 'https://aka.ms/golang/release/latest'
          cache: false

  # NEGATIVE: oldstable alias should fail too
  oldstable_alias_should_fail:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Expect failure (oldstable + custom URL)
        uses: gdams/setup-go@msgo
        with:
          go-version: 'oldstable'
          go-download-base-url: 'https://aka.ms/golang/release/latest'
          cache: false

  # NEGATIVE-ish: check-latest with custom URL should NOT resolve latest; it should just proceed with provided spec.
  # This job should PASS but is verifying the "unsupported check-latest" behavior.
  check_latest_is_ignored:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gdams/setup-go@msgo
        with:
          go-version: '1.25.0'
          check-latest: true
          go-download-base-url: 'https://aka.ms/golang/release/latest'
          cache: false
      - run: go version

  # NEGATIVE: invalid base URL should fail early/at download time
  invalid_base_url_should_fail:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Expect failure (invalid URL)
        uses: gdams/setup-go@msgo
        with:
          go-version: '1.23.4'
          go-download-base-url: 'https://example.invalid/golang'
          cache: false