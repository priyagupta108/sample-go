name: envvar_base_url_all_os
on: [push]

jobs:
  envvar_base_url_all_os:
    name: env var base url (aka.ms)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, windows-11-arm, macos-15-intel, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: gdams/setup-go@msgo
        env:
          GO_DOWNLOAD_BASE_URL: "https://aka.ms/golang/release/latest"
        with:
          go-version: ${{ matrix.os == 'windows-11-arm' && '1.22.0' || '1.25.0' }}
      - run: go version