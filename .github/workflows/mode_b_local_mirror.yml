# This proves the fallback path works when listing is missing,
# but archives exist at the constructed URL.

name: custom-go-download-mode-b-direct-fallback
on: [push]

jobs:
  mode_b_local_mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare mirror content (NO JSON listing handler)
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p mirror
          curl -L -o mirror/go1.23.4.linux-amd64.tar.gz \
            https://go.dev/dl/go1.23.4.linux-amd64.tar.gz
      - name: Start dumb http server (will NOT serve listing)
        shell: bash
        run: |
          set -euxo pipefail
          cd mirror
          python3 -m http.server 8001 --bind 127.0.0.1 >/tmp/http.log 2>&1 &
          echo $! > /tmp/http.pid
      - name: Setup Go (should fall back to direct URL)
        uses: gdams/setup-go@78af96c1885b2270a86c2a62d9746c607d9a00dd
        with:
          go-version: '1.23.4'
          go-download-base-url: 'http://127.0.0.1:8001'
          cache: false

      - run: go version
