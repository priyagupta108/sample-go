name: Setup GO
on: push

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
 steps:
  - uses: actions/checkout@v6
  - uses: gdams/setup-go@msgo
    with:
      go-version: '1.23.4'
      go-download-base-url: 'https://mirror.example.com/golang'
  - run: go version
