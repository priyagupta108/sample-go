name: go_dev_test
on: [push]

jobs:
  go_dev_test:
    name: Url (go.dev)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, windows-11-arm, macos-15-intel, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: gdams/setup-go@msgo
        with:
          go-version: ${{ matrix.os == 'windows-11-arm' && '1.26.0' || '1.25.0' }}
          go-download-base-url: "https://go.dev/dl"
      - run: go version