name: Test cache-hit

on:
  push:

jobs:
  repro:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: setup-go (v6)
        id: setupgo
        # uses: lmvysakh/setup-go@fileexists_resolution
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
      - name: Show cache-hit
        run: echo "cache-hit=${{ steps.setupgo.outputs.cache-hit }}"
      
      - name: Download deps
        # if: steps.setupgo.outputs.cache-hit != 'true'
        run: go mod download

      - name: Build/Test
        run: go test ./...