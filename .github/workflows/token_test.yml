name: Test setup-go custom download URL + dummy token (passing)

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for local action usage)
        uses: actions/checkout@v4

      - name: Start local mirror server (logs Authorization; serves real tarball)
        shell: bash
        run: |
          cat > server.py << 'PY'
          import http.server, socketserver, urllib.request

          GO_URL = "https://go.dev/dl/go1.25.0.linux-amd64.tar.gz"

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  auth = self.headers.get('Authorization')
                  print(f"REQ path={self.path} Authorization={auth}", flush=True)

                  # Force setup-go to fall back to direct-download URL construction
                  if self.path.startswith('/?mode=json'):
                      self.send_response(404)
                      self.end_headers()
                      self.wfile.write(b'not found')
                      return

                  if self.path == '/go1.25.0.linux-amd64.tar.gz':
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/gzip')
                      self.end_headers()
                      with urllib.request.urlopen(GO_URL) as r:
                          while True:
                              chunk = r.read(1024 * 1024)
                              if not chunk:
                                  break
                              self.wfile.write(chunk)
                      return

                  self.send_response(404)
                  self.end_headers()
                  self.wfile.write(b'not found')

              def log_message(self, format, *args):
                  return

          port = 8123
          with socketserver.TCPServer(("127.0.0.1", port), Handler) as httpd:
              print(f"Listening on http://127.0.0.1:{port}", flush=True)
              httpd.serve_forever()
          PY

          python3 server.py > server.log 2>&1 &
          echo $! > server.pid

      - name: Run setup-go against local server (dummy token)
        uses: gdams/setup-go@msgo
        with:
          go-version: "1.25.0"
          go-download-base-url: "http://127.0.0.1:8123"
          token: "dummy-token"
          cache: false

      - name: Go version (should succeed)
        run: go version

      - name: Dump server log (verify header forwarding)
        if: always()
        shell: bash
        run: |
          echo "==== server.log ===="
          cat server.log || true
          echo
          echo "Look for: Authorization=token dummy-token"

      - name: Stop server
        if: always()
        shell: bash
        run: |
          kill "$(cat server.pid)" || true