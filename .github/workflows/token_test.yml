# Below is a drop-in way to make your local mirror a **protected host** (token required).
# It validates token support by:
# - Returning 401 unless the request includes a valid Authorization header
# - Using the action's existing `with: token:` input to supply the token
#
# Notes:
# - This protects both the JSON listing endpoint AND the artifact download.
# - Choose ONE auth scheme to enforce. Below uses "Bearer <token>" (recommended).
# - Make sure your action actually forwards `with: token` to the HTTP client
#   used for JSON listing + file download.

name: custom-go-download-mode-a-json-listing-protected
on: [push]

jobs:
  mode_a_local_mirror_protected:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare mirror content + protected server
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p mirror
          curl -L -o mirror/go1.23.4.linux-amd64.tar.gz \
            https://go.dev/dl/go1.23.4.linux-amd64.tar.gz

          cat > mirror/listing.json <<'JSON'
          [
            {
              "version": "go1.23.4",
              "stable": true,
              "files": [
                {
                  "filename": "go1.23.4.linux-amd64.tar.gz",
                  "os": "linux",
                  "arch": "amd64",
                  "kind": "archive"
                }
              ]
            }
          ]
          JSON

          cat > mirror/server.py <<'PY'
          import os
          from http.server import SimpleHTTPRequestHandler, ThreadingHTTPServer
          from urllib.parse import urlparse, parse_qs

          REQUIRED = os.environ.get("MIRROR_TOKEN", "")

          def authorized(handler):
              # Accept: Authorization: Bearer <token>
              auth = handler.headers.get("Authorization", "")
              return bool(REQUIRED) and auth == f"Bearer {REQUIRED}"

          class Handler(SimpleHTTPRequestHandler):
              def do_GET(self):
                  if not authorized(self):
                      self.send_response(401)
                      self.send_header("Content-Type", "text/plain")
                      self.end_headers()
                      self.wfile.write(b"unauthorized\n")
                      return

                  u = urlparse(self.path)
                  qs = parse_qs(u.query)

                  # Match what setup-go expects for the listing endpoint
                  # (your handler already used "/" with mode=json&include=all)
                  if u.path == "/" and qs.get("mode") == ["json"] and qs.get("include") == ["all"]:
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      with open("listing.json", "rb") as f:
                          self.wfile.write(f.read())
                      return

                  return super().do_GET()

          ThreadingHTTPServer(("127.0.0.1", 8000), Handler).serve_forever()
          PY

      - name: Start local protected mirror server (Mode A)
        shell: bash
        run: |
          set -euxo pipefail
          cd mirror
          MIRROR_TOKEN='test-token-123' python3 server.py >/tmp/mirror.log 2>&1 &
          echo $! > /tmp/mirror.pid

      - name: Setup Go from protected local mirror (listing endpoint)
        uses: gdams/setup-go@msgo
        with:
          go-version: "1.23.4"
          go-download-base-url: "http://127.0.0.1:8000"
          token: "test-token-123"
          cache: false

      - run: go version

      # negative test (should fail without token)
      - name: Setup Go without token (should fail)
        continue-on-error: true
        uses: gdams/setup-go@msgo
        with:
          go-version: "1.23.4"
          go-download-base-url: "http://127.0.0.1:8000"
          cache: false