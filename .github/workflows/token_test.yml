name: token-protected-mirror-e2e
on:
  workflow_dispatch:
  push:

jobs:
  with_token_should_succeed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Prepare mirror content + protected server
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p mirror

          GO_VER="1.23.4"
          FILE="go${GO_VER}.linux-amd64.tar.gz"

          curl -fsSL -o "mirror/${FILE}" "https://go.dev/dl/${FILE}"

          cat > mirror/listing.json <<JSON
          [
            {
              "version": "go${GO_VER}",
              "stable": true,
              "files": [
                {
                  "filename": "${FILE}",
                  "os": "linux",
                  "arch": "amd64",
                  "kind": "archive"
                }
              ]
            }
          ]
          JSON

          cat > mirror/server.py <<'PY'
          import os
          from http.server import SimpleHTTPRequestHandler, ThreadingHTTPServer
          from urllib.parse import urlparse, parse_qs

          REQUIRED = os.environ.get("MIRROR_TOKEN", "")

          def authorized(handler):
              auth = handler.headers.get("Authorization", "")
              if not REQUIRED:
                  return False
              # PR #721 sends: Authorization: token <token>
              # Also accept Bearer for compatibility.
              return auth in (f"token {REQUIRED}", f"Bearer {REQUIRED}")

          class Handler(SimpleHTTPRequestHandler):
              def do_GET(self):
                  auth = self.headers.get("Authorization", "")
                  print(f"[mirror] path={self.path} auth={auth!r}", flush=True)

                  if not authorized(self):
                      self.send_response(401)
                      self.send_header("Content-Type", "text/plain")
                      self.end_headers()
                      self.wfile.write(b"unauthorized\n")
                      return

                  u = urlparse(self.path)
                  qs = parse_qs(u.query)

                  # Listing endpoint
                  if u.path == "/" and qs.get("mode") == ["json"] and qs.get("include") == ["all"]:
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      with open("listing.json", "rb") as f:
                          self.wfile.write(f.read())
                      return

                  return super().do_GET()

          ThreadingHTTPServer(("127.0.0.1", 8000), Handler).serve_forever()
          PY

      - name: Start protected mirror server
        shell: bash
        run: |
          set -euxo pipefail
          cd mirror
          MIRROR_TOKEN='test-token-123' python3 server.py > /tmp/mirror.log 2>&1 &
          echo $! > /tmp/mirror.pid

      - name: Setup Go from protected mirror (token) - SHOULD SUCCEED
        uses: gdams/setup-go@msgo
        with:
          go-version: "1.23.4"
          go-download-base-url: "http://127.0.0.1:8000"
          token: "test-token-123"
          cache: false
          check-latest: false

      - name: Verify Go
        run: go version

      - name: Show mirror log
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          echo "----- /tmp/mirror.log -----"
          tail -n +1 /tmp/mirror.log || true

  without_token_should_fail:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Prepare mirror content + protected server
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p mirror

          GO_VER="1.23.4"
          FILE="go${GO_VER}.linux-amd64.tar.gz"

          curl -fsSL -o "mirror/${FILE}" "https://go.dev/dl/${FILE}"

          cat > mirror/listing.json <<JSON
          [
            {
              "version": "go${GO_VER}",
              "stable": true,
              "files": [
                {
                  "filename": "${FILE}",
                  "os": "linux",
                  "arch": "amd64",
                  "kind": "archive"
                }
              ]
            }
          ]
          JSON

          cat > mirror/server.py <<'PY'
          import os
          from http.server import SimpleHTTPRequestHandler, ThreadingHTTPServer
          from urllib.parse import urlparse, parse_qs

          REQUIRED = os.environ.get("MIRROR_TOKEN", "")

          def authorized(handler):
              auth = handler.headers.get("Authorization", "")
              if not REQUIRED:
                  return False
              return auth in (f"token {REQUIRED}", f"Bearer {REQUIRED}")

          class Handler(SimpleHTTPRequestHandler):
              def do_GET(self):
                  auth = self.headers.get("Authorization", "")
                  print(f"[mirror] path={self.path} auth={auth!r}", flush=True)

                  if not authorized(self):
                      self.send_response(401)
                      self.send_header("Content-Type", "text/plain")
                      self.end_headers()
                      self.wfile.write(b"unauthorized\n")
                      return

                  u = urlparse(self.path)
                  qs = parse_qs(u.query)
                  if u.path == "/" and qs.get("mode") == ["json"] and qs.get("include") == ["all"]:
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.end_headers()
                      with open("listing.json", "rb") as f:
                          self.wfile.write(f.read())
                      return

                  return super().do_GET()

          ThreadingHTTPServer(("127.0.0.1", 8000), Handler).serve_forever()
          PY

      - name: Start protected mirror server
        shell: bash
        run: |
          set -euxo pipefail
          cd mirror
          MIRROR_TOKEN='test-token-123' python3 server.py > /tmp/mirror.log 2>&1 &
          echo $! > /tmp/mirror.pid

      - name: Setup Go from protected mirror (NO token) - SHOULD FAIL
        uses: gdams/setup-go@msgo
        with:
          go-version: "1.23.4"
          go-download-base-url: "http://127.0.0.1:8000"
          cache: false
          check-latest: false

      - name: Show mirror log
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          echo "----- /tmp/mirror.log -----"
          tail -n +1 /tmp/mirror.log || true